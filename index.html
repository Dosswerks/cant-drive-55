const A={
    playerCarImage:'assets/player.png',enemyCarImage:'assets/enemy.png',

    billboard1Image:'assets/billboard1.png',billboard2Image:'assets/billboard2.png',

};
const C=document.getElementById('game'),X=C.getContext('2d');
const W=640,H=480,N=300,SL=100,RW=1400;
const img={},snd={};
function li(k,s){return new Promise(r=>{if(!s)return r();const i=new Image();i.onload=()=>{img[k]=i;r()};i.onerror=()=>r();i.src=s})}
function ls(k,s){if(!s)return;snd[k]=new Audio(s);snd[k].volume=0.5}
function ps(k){if(snd[k]){try{const s=new Audio(snd[k].src);s.volume=snd[k].volume;s.play().catch(()=>{});}catch(e){}}}
let music=null;
function startM(){if(music&&music.paused)music.play().catch(()=>{})}
function stopM(){if(music){music.pause();music.currentTime=0}}

<script>
// Track
const TL=600;
let seg=[];
function buildTrack(){
    seg=[];
    for(let i=0;i<TL;i++){
        let c=0,h=0;
        if(i>30&&i<60)c=0.8;if(i>70&&i<100)c=-0.8;
        if(i>110&&i<150)c=1.5;if(i>160&&i<200)c=-1.8;
        if(i>210&&i<260)c=2.5;if(i>270&&i<320)c=-3;
        if(i>330&&i<350)c=2;if(i>360&&i<400)c=3.5;
        if(i>410&&i<450)c=-4;if(i>460&&i<500)c=3;
        if(i>510&&i<550)c=-3.5;if(i>560&&i<590)c=4;
        if(i>50&&i<80)h=Math.sin((i-50)/30*Math.PI)*20;
        if(i>150&&i<190)h=Math.sin((i-150)/40*Math.PI)*30;
        if(i>280&&i<330)h=-Math.sin((i-280)/50*Math.PI)*25;
        if(i>420&&i<470)h=Math.sin((i-420)/50*Math.PI)*35;
        // Scenery — spaced out, no overlaps
        let sc=[];
        if(i%60===0)sc.push({t:'bb',s:1,o:1.8+Math.random(),v:Math.floor(Math.random()*6)+1});
        if(i%60===30)sc.push({t:'bb',s:-1,o:1.8+Math.random(),v:Math.floor(Math.random()*6)+1});
        if(i%80===15)sc.push({t:'sign',s:1,o:1.5+Math.random()*0.5});
        if(i%80===55)sc.push({t:'sign',s:-1,o:1.5+Math.random()*0.5});
        seg.push({c,h,cars:[],sc});
    }
}
</script>
<script>
// Game state
let G={};
function initGame(){
    buildTrack();
    G={run:false,over:false,pos:0,spd:0,mx:SL*1.0,px:0,
       lap:1,laps:3,lives:5,time:60,crash:0,
       keys:{l:false,r:false},tx:null,sky:0,
       dist:0,nextCop:300,cops:0,offRoad:false,shake:0};
    updUI();
}
function updUI(){
    document.getElementById('time').textContent=Math.max(0,Math.ceil(G.time));
    document.getElementById('lap').textContent='Mile '+G.lap+' of '+G.laps;
}
function update(dt){
    if(!G.run||G.over)return;
    G.time-=dt;
    if(G.time<=0){G.time=0;G.over=true;stopM();ps('gameover');updUI();return;}
    if(G.crash>0){G.crash-=dt;G.spd*=0.95;updUI();return;}
    // Auto accel — slower ramp
    G.spd=Math.min(G.spd+0.3,G.mx);
    // Steer
    let st=0;
    if(G.keys.l)st=-0.012;if(G.keys.r)st=0.012;
    G.px+=st*(G.spd/G.mx);
    // Off road
    if(Math.abs(G.px)>0.55){
        if(!G.offRoad){G.offRoad=true;ps('offroad');}
        G.shake=Math.min(G.shake+0.15,4);
        G.spd=Math.max(G.mx*0.08,G.spd-2.4);
    }else{G.offRoad=false;G.shake=Math.max(0,G.shake-0.5);}
    // Curve pull
    const si=Math.floor(G.pos/SL)%TL;
    G.px-=seg[si].c*(G.spd/G.mx)*0.002;
    G.sky+=seg[si].c*(G.spd/G.mx)*0.15;
    G.pos+=G.spd;G.dist+=G.spd;
    // Spawn cops
    if(G.dist>G.nextCop*SL&&G.cops<8){
        const idx=(si+100+Math.floor(Math.random()*120))%TL;
        if(!seg[idx].cars.length){
            seg[idx].cars.push({o:(Math.random()-0.5)*1.2,p:false});
            G.cops++;
        }
        G.nextCop=G.dist/SL+Math.max(60,250-G.cops*20);
    }
    // Lap
    if(G.pos>=TL*SL){G.pos-=TL*SL;G.lap++;G.time+=30;ps('lap');
        if(G.lap>G.laps){G.over=true;stopM();ps('win');}}
    // Collision
    for(let i=0;i<10;i++){
        const idx=(si+i)%TL;
        for(const car of seg[idx].cars){
            const cz=((idx*SL)-G.pos+TL*SL)%(TL*SL);
            if(cz>0&&cz<SL*3&&Math.abs(G.px-car.o)<0.25){
                G.crash=1.5;G.spd=0;G.px=0;G.pos=0;G.lives--;ps('crash');
                for(let c=0;c<30;c++){const ci=(si+c)%TL;G.cops-=seg[ci].cars.length;seg[ci].cars=[];}
                G.cops=Math.max(0,G.cops);
                for(let c=0;c<3;c++){const ni=(si+50+Math.floor(Math.random()*100))%TL;
                    seg[ni].cars.push({o:(Math.random()-0.5)*1.2,p:false});G.cops++;}
                if(G.lives<=0){G.over=true;stopM();ps('gameover');}
                break;
            }
        }
    }
    // Pass — trigger when cop is visible ahead (within 20 segments)
    const si3=Math.floor(G.pos/SL)%TL;
    for(let i=1;i<50;i++){
        const idx=(si3+i)%TL;
        for(const car of seg[idx].cars){
            if(!car.p && i<20){car.p=true;ps('pass');}
        }
    }
    // Billboard/sign collision — if player is off road near scenery
    if(Math.abs(G.px)>0.6&&G.crash<=0){
        for(let i=0;i<8;i++){
            const idx=(si+i)%TL;
            for(const sc of seg[idx].sc){
                if((G.px>0&&sc.s>0)||(G.px<0&&sc.s<0)){
                    G.crash=1.5;G.spd=0;G.px=0;G.pos=0;G.lives--;ps('crash');
                    if(G.lives<=0){G.over=true;stopM();ps('gameover');}
                    break;
                }
            }
            if(G.crash>0)break;
        }
    }
    // Drift
    for(const s of seg)for(const car of s.cars){car.o+=(Math.random()-0.5)*0.005;car.o=Math.max(-1.1,Math.min(1.1,car.o));}
    updUI();
}
</script>
<script>
function draw(){
    // Sky
    if(img.background){X.drawImage(img.background,0,0,W,H*0.45);}
    else{
        const g=X.createLinearGradient(0,0,0,H*0.45);
        g.addColorStop(0,'#4a8acc');g.addColorStop(0.3,'#6aa4dd');
        g.addColorStop(0.6,'#8abcee');g.addColorStop(0.85,'#b8d8f0');g.addColorStop(1,'#d8e8f0');
        X.fillStyle=g;X.fillRect(0,0,W,H*0.45);
        // Hills
        X.fillStyle='#b8a878';X.beginPath();X.moveTo(0,H*0.45);
        for(let i=0;i<=W;i+=3){const v=Math.sin((i+G.sky*0.2)*0.006)*30+Math.cos((i+G.sky*0.2)*0.011)*18;X.lineTo(i,H*0.45-v-10);}
        X.lineTo(W,H*0.45);X.fill();
        X.fillStyle='#9a8a58';X.beginPath();X.moveTo(0,H*0.45);
        for(let i=0;i<=W;i+=3){const v=Math.sin((i+G.sky*0.5)*0.009)*22+Math.cos((i+G.sky*0.5)*0.016)*12;X.lineTo(i,H*0.45-v-3);}
        X.lineTo(W,H*0.45);X.fill();
    }
    // Horizon image
    if(img.horizon){const hx=(-G.sky*0.8%W+W)%W-W;X.drawImage(img.horizon,hx,H*0.39,W,60);X.drawImage(img.horizon,hx+W,H*0.39,W,60);}

    // Speedometer in sky
    if(G.run&&!G.over){
        const smx=W/2,smy=55,smr=40;
        const spdPct=Math.min(1,G.spd/G.mx);
        // Chrome border
        const cg=X.createRadialGradient(smx,smy,smr-2,smx,smy,smr+8);
        cg.addColorStop(0,'#555');cg.addColorStop(0.3,'#999');cg.addColorStop(0.6,'#888');cg.addColorStop(1,'#444');
        X.beginPath();X.arc(smx,smy,smr+8,0,Math.PI*2);X.fillStyle=cg;X.fill();
        // Dark face
        X.beginPath();X.arc(smx,smy,smr,0,Math.PI*2);X.fillStyle='#1a1a1a';X.fill();
        // Notches around inside perimeter
        X.strokeStyle='#888';X.lineWidth=1.5;
        for(let t=0;t<12;t++){
            const ang=Math.PI*0.8+t*(Math.PI*1.4/11);
            const ix=smx+Math.cos(ang)*(smr-4);
            const iy=smy+Math.sin(ang)*(smr-4);
            const ox=smx+Math.cos(ang)*(smr-10);
            const oy=smy+Math.sin(ang)*(smr-10);
            X.beginPath();X.moveTo(ix,iy);X.lineTo(ox,oy);X.stroke();
        }
        // Small notches
        X.strokeStyle='#555';X.lineWidth=1;
        for(let t=0;t<24;t++){
            const ang=Math.PI*0.8+t*(Math.PI*1.4/23);
            const ix=smx+Math.cos(ang)*(smr-4);
            const iy=smy+Math.sin(ang)*(smr-4);
            const ox=smx+Math.cos(ang)*(smr-7);
            const oy=smy+Math.sin(ang)*(smr-7);
            X.beginPath();X.moveTo(ix,iy);X.lineTo(ox,oy);X.stroke();
        }
        // Speed arc glow
        const endAngle=Math.PI*0.8+spdPct*Math.PI*1.4;
        X.beginPath();X.arc(smx,smy,smr-14,Math.PI*0.8,endAngle);
        X.strokeStyle=spdPct>0.8?'rgba(255,50,0,0.4)':spdPct>0.5?'rgba(255,170,0,0.3)':'rgba(68,204,68,0.3)';
        X.lineWidth=6;X.stroke();
        // Red needle
        const na2=Math.PI*0.8+spdPct*Math.PI*1.4;
        X.beginPath();X.moveTo(smx,smy);
        X.lineTo(smx+Math.cos(na2)*(smr-8),smy+Math.sin(na2)*(smr-8));
        X.strokeStyle='#ff2200';X.lineWidth=2.5;X.stroke();
        // Center cap
        X.beginPath();X.arc(smx,smy,4,0,Math.PI*2);X.fillStyle='#cc0000';X.fill();
        // MPH text inside circle
        const mph=Math.round(spdPct*125);
        X.fillStyle='#fff';X.font='bold 11px Arial';X.textAlign='center';
        X.fillText(mph+' mph',smx,smy+smr-12);
        X.textAlign='left';

        // Band logo — upper right
        if(img.bandLogo){
            X.drawImage(img.bandLogo,W-68,8,60,80);
        } else {
            X.fillStyle='rgba(0,0,0,0.3)';X.fillRect(W-68,8,60,80);
            X.fillStyle='#fff';X.font='bold 9px Arial';X.textAlign='center';
            X.fillText('LOGO',W-38,40);X.fillText('60x80',W-38,52);X.textAlign='left';
        }

        // Lives — upper left as tiny cars
        X.fillStyle='#000';X.font='bold 18px Arial';X.textAlign='left';
        X.fillText('LIVES LEFT:',8,33);
        for(let lv=0;lv<G.lives;lv++){
            const lx=8+lv*24,ly=37;
            if(img.livesCar){
                X.drawImage(img.livesCar,lx,ly,20,12);
            } else {
                X.fillStyle='#cc0000';X.fillRect(lx,ly,20,12);
                X.fillStyle='#88ccff';X.fillRect(lx+5,ly+1,10,4);
            }
        }
    }
    // Ground
    X.fillStyle='#a89858';X.fillRect(0,H*0.45,W,H*0.55);
    if(!G.run&&!G.over)return;
    // Shake
    if(G.shake>0.5){X.save();X.translate((Math.random()-0.5)*G.shake*2,(Math.random()-0.5)*G.shake*2);}

    const base=Math.floor(G.pos/SL);
    let cx=0,cdx=0;
    // Pre-compute projected segments
    const P=[];
    for(let n=1;n<N;n++){
        const i=(base+n)%TL,s=seg[i];
        const z=n*SL-(G.pos%SL);
        if(z<1)continue;
        const sc=1/(z*0.0015);
        const sx=W/2+(cx-G.px*RW*0.5)*sc;
        const sy=H*0.45+200/z*H*0.4-s.h*sc*0.3;
        const sw=RW*sc;
        cx+=cdx;cdx+=s.c*0.5;
        P.push({i,n,sx,sy,sw,sc,s});
    }

    // Draw road far to near (far first, near paints over)
    for(let j=P.length-2;j>=0;j--){
        const b=P[j+1],a=P[j];
        const alt=Math.floor(a.i/3)%2;
        // Swap so na=near(bottom), nb=far(top)
        let na=a,nb=b;
        if(a.sy<b.sy){na=b;nb=a;}
        if(na.sy<H*0.45)continue; // both above horizon
        // Shoulder
        const rw1=na.sw*0.28,rw2=nb.sw*0.28;
        const sh1=rw1*1.35,sh2=rw2*1.35;
        dp(na.sx-sh1,na.sy,na.sx+sh1,na.sy,nb.sx+sh2,nb.sy,nb.sx-sh2,nb.sy,alt?'#8a7a48':'#7e7040');
        // Rumble
        dp(na.sx-rw1*1.12,na.sy,na.sx-rw1,na.sy,nb.sx-rw2,nb.sy,nb.sx-rw2*1.12,nb.sy,alt?'#cc0000':'#fff');
        dp(na.sx+rw1,na.sy,na.sx+rw1*1.12,na.sy,nb.sx+rw2*1.12,nb.sy,nb.sx+rw2,nb.sy,alt?'#cc0000':'#fff');
        // Road
        dp(na.sx-rw1,na.sy,na.sx+rw1,na.sy,nb.sx+rw2,nb.sy,nb.sx-rw2,nb.sy,alt?'#404040':'#4a4a4a');
        // Lines
        if(!alt){const lw=Math.max(1,rw1*0.02);dp(na.sx-lw,na.sy,na.sx+lw,na.sy,nb.sx+lw,nb.sy,nb.sx-lw,nb.sy,'#fff');}
        if(alt){const lw=Math.max(1,rw1*0.01);
            dp(na.sx+rw1*0.33-lw,na.sy,na.sx+rw1*0.33+lw,na.sy,nb.sx+rw2*0.33+lw,nb.sy,nb.sx+rw2*0.33-lw,nb.sy,'#ddd');
            dp(na.sx-rw1*0.33-lw,na.sy,na.sx-rw1*0.33+lw,na.sy,nb.sx-rw2*0.33+lw,nb.sy,nb.sx-rw2*0.33-lw,nb.sy,'#ddd');
        }
    }
    // Draw sprites back to front (far first)
    for(let j=P.length-1;j>=0;j--){
        const p=P[j],rw=p.sw*0.28;
        if(p.sy<H*0.45)continue;
        // Scenery
        for(const sc of p.s.sc){
            const sx=p.sx+sc.s*sc.o*rw;
            const sz=rw*0.015;
            if(sz<0.3)continue;
            if(sc.t==='bb'){
                const bw=sz*80,bh=sz*40;
                const bk='billboard'+sc.v;
                if(img[bk]){X.drawImage(img[bk],sx-bw/2,p.sy-bh,bw,bh);}
                else{X.fillStyle='#884400';X.fillRect(sx-bw/2,p.sy-bh,bw,bh);
                    X.fillStyle='#555';X.fillRect(sx-sz*2,p.sy,sz*4,sz*5);
                    if(bh>12){X.fillStyle='#fff';X.font=`bold ${Math.max(6,bh*0.2)}px Arial`;X.textAlign='center';
                        X.fillText('BB'+sc.v,sx,p.sy-bh/2+4);X.textAlign='left';}}
            }else if(sc.t==='sign'){
                const sw2=sz*30,sh=sz*45;
                if(img.sign){X.drawImage(img.sign,sx-sw2/2,p.sy-sh,sw2,sh);}
                else{X.fillStyle='#fff';X.fillRect(sx-sw2/2,p.sy-sh,sw2,sh*0.6);
                    X.fillStyle='#888';X.fillRect(sx-sz,p.sy-sh*0.4,sz*2,sh*0.4);
                    if(sh>15){X.fillStyle='#000';X.font=`bold ${Math.max(5,sh*0.15)}px Arial`;X.textAlign='center';
                        X.fillText('55',sx,p.sy-sh*0.55);X.textAlign='left';}}
            }
        }
        // Cars
        for(const car of p.s.cars){
            const cx2=p.sx+car.o*rw;
            const cw=rw*0.33,ch=rw*0.21;
            if(ch<3)continue;
            if(img.enemyCar){X.drawImage(img.enemyCar,cx2-cw/2,p.sy-ch,cw,ch);}
            else{X.fillStyle='#0044cc';X.fillRect(cx2-cw/2,p.sy-ch,cw,ch);
                X.fillStyle='#eee';X.fillRect(cx2-cw*0.45,p.sy-ch*0.6,cw*0.9,ch*0.3);
                // Flashing lights
                const lw2=cw*0.3,lh2=Math.max(2,ch*0.12);
                const flash=Math.floor(Date.now()/200)%2===0;
                X.fillStyle=flash?'#ff0000':'#440000';
                X.fillRect(cx2-lw2/2,p.sy-ch-lh2,lw2/2,lh2);
                X.fillStyle=flash?'#000088':'#0044ff';
                X.fillRect(cx2,p.sy-ch-lh2,lw2/2,lh2);
                if(ch>10){X.fillStyle='#fff';X.font=`bold ${Math.max(6,ch*0.2)}px Arial`;X.textAlign='center';
                    X.fillText('POLICE',cx2,p.sy-ch*0.35);X.textAlign='left';}}
        }
    }
    if(G.shake>0.5)X.restore();
    // Player
    // Player car or explosion
    const pw=250,ph=155,px=W/2,py=H-20;
    if(G.crash>0){
        // Show explosion sprite — alternate frames
        const frame=Math.floor(Date.now()/150)%2===0?'explosion1':'explosion2';
        if(img[frame]){
            X.drawImage(img[frame],px-pw/2,py-ph,pw,ph);
        } else {
            // Default explosion — orange/red burst
            X.fillStyle='#ff6600';
            X.beginPath();X.arc(px,py-ph/2,pw*0.3,0,Math.PI*2);X.fill();
            X.fillStyle='#ffcc00';
            X.beginPath();X.arc(px,py-ph/2,pw*0.2,0,Math.PI*2);X.fill();
            X.fillStyle='#fff';
            X.beginPath();X.arc(px,py-ph/2,pw*0.08,0,Math.PI*2);X.fill();
        }
    } else {
    // Drop shadow under car
    X.fillStyle='rgba(0,0,0,0.2)';
    X.beginPath();
    X.ellipse(px,py-ph*0.3,pw*0.48,ph*0.45,0,0,Math.PI*2);
    X.fill();
    const tilt=(G.keys.l?-0.08:0)+(G.keys.r?0.08:0)+(G.tx!==null?(G.tx-W/2)/W*0.12:0);
    X.save();X.translate(px,py);X.rotate(tilt);
    if(img.playerCar){X.drawImage(img.playerCar,-pw/2,-ph,pw,ph);}
    else{X.fillStyle='#cc0000';X.fillRect(-pw/2,-ph,pw,ph);
        X.fillStyle='#fff';X.font='bold 12px Arial';X.textAlign='center';
        X.fillText('PLAYER',0,-ph/2+4);X.fillText('250x155',0,-ph/2+18);X.textAlign='left';}
    X.restore();
    }
    // Speed lines
    if(G.spd>G.mx*0.7){const a=(G.spd-G.mx*0.7)/(G.mx*0.3);
        X.strokeStyle=`rgba(255,255,255,${a*0.12})`;X.lineWidth=1;
        for(let i=0;i<6;i++){const lx=Math.random()*W,ly=H*0.5+Math.random()*H*0.4;
            X.beginPath();X.moveTo(lx,ly);X.lineTo(lx,ly+20+Math.random()*30);X.stroke();}}
    // Off-road dust
    if(G.offRoad&&G.spd>5){X.fillStyle=`rgba(168,152,88,${Math.min(0.3,G.shake*0.05)})`;X.fillRect(0,H*0.5,W,H*0.5);}
    // Crash
    if(G.crash>0){X.fillStyle=`rgba(255,0,0,${G.crash*0.25})`;X.fillRect(0,0,W,H);}
    // Game over
    if(G.over){X.fillStyle='rgba(0,0,0,0.75)';X.fillRect(0,0,W,H);
        X.textAlign='center';
        if(G.lap>G.laps){
            if(img.bandLogo){X.drawImage(img.bandLogo,W/2-30,H/2-160,60,80);}
            X.fillStyle='#cc0000';X.font='bold 48px Arial';
            X.fillText('YOU MADE IT!',W/2,H/2-24);
        } else if(G.lives<=0){
            // License image above text
            if(img.license){X.drawImage(img.license,W/2-100,H/2-160,200,120);}
            else{X.fillStyle='rgba(255,255,255,0.2)';X.fillRect(W/2-100,H/2-160,200,120);
                X.fillStyle='#fff';X.font='bold 10px Arial';
                X.fillText('LICENSE',W/2,H/2-80);X.fillText('200x120',W/2,H/2-65);}
            X.fillStyle='#cc0000';X.font='bold 48px Arial';
            X.fillText('REVOKED!',W/2,H/2+10);
        } else {
            // Time's up image
            if(img.timesUp){X.drawImage(img.timesUp,W/2-100,H/2-156,200,112);}
            else{X.fillStyle='rgba(255,255,255,0.2)';X.fillRect(W/2-100,H/2-156,200,112);
                X.fillStyle='#fff';X.font='bold 10px Arial';
                X.fillText('TIMESUP',W/2,H/2-100);X.fillText('200x112',W/2,H/2-85);}
            X.fillStyle='#cc0000';X.font='bold 48px Arial';
            X.fillText("TIME'S UP!",W/2,H/2+10);
        }
        X.fillStyle='#fff';X.font='bold 22px Arial';
        X.fillText('Miles: '+Math.min(G.lap,G.laps)+'/'+G.laps,W/2,H/2+46);
        X.fillText('Tap or press R to restart',W/2,H/2+80);X.textAlign='left';}
}
function dp(x1,y1,x2,y2,x3,y3,x4,y4,c){X.fillStyle=c;X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.lineTo(x3,y3);X.lineTo(x4,y4);X.closePath();X.fill();}
</script>
<script>
let lt=0;
function loop(t){const dt=Math.min((t-lt)/1000,0.05);lt=t;update(dt);draw();requestAnimationFrame(loop);}
const SS=document.getElementById('start-screen');
function go(){if(!G.run&&!G.over){G.run=true;SS.classList.add('hidden');startM();}}
SS.addEventListener('click',go);
SS.addEventListener('touchstart',e=>{e.preventDefault();go();},{passive:false});
document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')G.keys.l=true;if(e.key==='ArrowRight')G.keys.r=true;
    if(e.key==='r'||e.key==='R'){initGame();G.run=true;SS.classList.add('hidden');startM();}
    if(e.key==='q'||e.key==='Q'){stopM();initGame();SS.classList.remove('hidden');}
});
document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')G.keys.l=false;if(e.key==='ArrowRight')G.keys.r=false;});
C.addEventListener('touchstart',e=>{e.preventDefault();
    if(G.over){initGame();G.run=true;startM();return;}
    const r=C.getBoundingClientRect();G.tx=(e.touches[0].clientX-r.left)*(W/r.width);
    G.px=((G.tx-W/2)/(W/2))*1.1;
},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();
    const r=C.getBoundingClientRect();G.tx=(e.touches[0].clientX-r.left)*(W/r.width);
    G.px=((G.tx-W/2)/(W/2))*1.1;
},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();G.tx=null;},{passive:false});
C.addEventListener('click',()=>{if(G.over){initGame();G.run=true;startM();}});
document.addEventListener('touchmove',e=>{if(e.target===C)e.preventDefault();},{passive:false});

async function init(){
    await Promise.all([
        li('playerCar',A.playerCarImage),li('enemyCar',A.enemyCarImage),
        li('background',A.backgroundImage),li('boxArt',A.boxArtImage),
        li('billboard1',A.billboard1Image),li('billboard2',A.billboard2Image),
        li('billboard3',A.billboard3Image),li('billboard4',A.billboard4Image),
        li('billboard5',A.billboard5Image),li('billboard6',A.billboard6Image),
        li('sign',A.signImage),li('horizon',A.horizonImage),
        li('bandLogo',A.bandLogoImage),
        li('livesCar',A.livesCarImage),
        li('explosion1',A.explosion1Image),
        li('explosion2',A.explosion2Image),
        li('license',A.licenseImage),
        li('timesUp',A.timesUpImage),
    ]);
    if(img.boxArt){document.getElementById('box-art').src=A.boxArtImage;
        document.getElementById('box-art-container').classList.remove('hidden');
        SS.classList.add('has-box-art');}
    ls('crash',A.crashSound);ls('pass',A.passSound);ls('lap',A.lapSound);ls('offroad',A.offRoadSound);
    ls('gameover',A.gameOverSound);ls('win',A.winSound);
    if(A.backgroundMusic){music=new Audio(A.backgroundMusic);music.loop=true;music.volume=0.85;}
    initGame();requestAnimationFrame(loop);
}
init();
</script>
